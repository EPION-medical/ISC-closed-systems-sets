<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISC Market Overview - EPION Medical</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple SVG Icons to replace lucide-react in a single HTML file
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                BarChart3: <><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>,
                ShieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>,
                Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                Award: <><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/><path d="M12 2v1"/></>,
                Layers: <><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m2.6 12.33 8.58 3.9a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83l-8.58 3.9a2 2 0 0 1-1.66 0L2.6 10.5a1 1 0 0 0 0 1.83Z"/><path d="m2.6 16.58 8.58 3.9a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83l-8.58 3.9a2 2 0 0 1-1.66 0L2.6 14.75a1 1 0 0 0 0 1.83Z"/></>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                // Slide 1: Nadpis
                {
                    type: 'title',
                    content: (
                        <div className="flex flex-col items-center justify-center h-full text-center p-10 bg-gradient-to-br from-blue-900 to-indigo-900 text-white rounded-xl shadow-2xl relative overflow-hidden">
                            <Icon name="BarChart3" size={80} className="mb-6 text-blue-300 opacity-80" />
                            <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight uppercase">MARKET OVERVIEW</h1>
                            <h2 className="text-2xl md:text-3xl font-light text-blue-200 uppercase tracking-widest">ISC Closed Systems</h2>
                            <p className="mt-4 text-xl opacity-70">(catheter sets)</p>
                            <div className="w-24 h-1 bg-blue-400 mt-12 mb-16 rounded-full"></div>
                            <div className="absolute bottom-8 text-blue-300 text-sm font-medium tracking-widest opacity-60">
                                Created by EPION Medical
                            </div>
                        </div>
                    )
                },
                // Slide 2: Slovenský trh
                {
                    type: 'content',
                    title: 'SLOVAK MARKET: BRANDS & PORTFOLIO',
                    content: (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                            <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                                <h3 className="text-xl font-semibold mb-4 text-blue-800 flex items-center gap-2">
                                    <Icon name="Award" className="text-blue-500" /> Brands of Closed Systems in Slovakia
                                </h3>
                                <div className="flex flex-wrap gap-3">
                                    {['Coloplast', 'B. Braun', 'Wellspect (since 2026)'].map((brand, i) => (
                                        <span key={i} className="px-4 py-2 bg-blue-50 text-blue-700 rounded-lg font-medium border border-blue-100">
                                            {brand}
                                        </span>
                                    ))}
                                </div>
                                <div className="mt-8">
                                    <h3 className="text-xl font-semibold mb-4 text-blue-800 flex items-center gap-2">
                                        <Icon name="ShieldCheck" className="text-blue-500" /> Main Characteristics
                                    </h3>
                                    <ul className="space-y-3 text-slate-700">
                                        <li className="flex items-start gap-2 italic">
                                            <span className="text-blue-500 font-bold">•</span>
                                            only fully reimbursed catheters without patient co-payment
                                        </li>
                                        <li className="flex items-start gap-2 italic">
                                            <span className="text-blue-500 font-bold">•</span>
                                            Ready-to-Use (RTU) catheters
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <div className="bg-blue-900 text-white p-8 rounded-xl flex flex-col justify-center">
                                <h3 className="text-2xl font-semibold mb-6 flex items-center gap-2">
                                    <Icon name="Zap" className="text-yellow-400" /> Preferred Technology
                                </h3>
                                <div className="space-y-6">
                                    <div>
                                        <p className="text-blue-200 text-sm uppercase tracking-wider mb-1 text-[10px]">Material Trend</p>
                                        <p className="text-xl font-medium">Shift toward PVC-free materials</p>
                                    </div>
                                    <div>
                                        <p className="text-blue-200 text-sm uppercase tracking-wider mb-1 text-[10px]">Coating Status</p>
                                        <p className="text-xl font-medium">Dominance of hydrophilic coatings</p>
                                    </div>
                                    <div>
                                        <p className="text-blue-200 text-sm uppercase tracking-wider mb-1 text-[10px]">Product Demand</p>
                                        <p className="text-xl font-medium">High demand for closed systems - sets</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                },
                // Slide 3: Lídri
                {
                    type: 'content',
                    title: 'SLOVAK MARKET: PRODUCT LEADERS',
                    content: (
                        <div className="flex flex-col h-full justify-center">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                {[
                                    { name: 'SpeediCath Compact Set', brand: 'Coloplast' },
                                    { name: 'SpeediCath Standard', brand: 'Coloplast' },
                                    { name: 'SpeediCath Compact', brand: 'Coloplast' },
                                    { name: 'Actreen Hi-Lite Set', brand: 'B. Braun' }
                                ].map((product, i) => (
                                    <div key={i} className="flex items-center p-6 bg-slate-50 rounded-xl border-l-4 border-blue-600 hover:shadow-md transition-shadow">
                                        <div className="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold mr-4 shrink-0">
                                            {i + 1}
                                        </div>
                                        <div>
                                            <h4 className="text-xl font-bold text-slate-800">{product.name}</h4>
                                            <p className="text-slate-500 text-sm uppercase">{product.brand}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                // Slide 4: Tabuľka
                {
                    type: 'content',
                    title: 'ESTABLISHED CLOSED SYSTEM PRODUCTS (SK/CZ)',
                    content: (
                        <div className="flex flex-col h-full gap-4">
                            <div className="overflow-x-auto">
                                <table className="w-full border-collapse bg-white shadow-sm rounded-lg overflow-hidden">
                                    <thead className="bg-slate-100 border-b border-slate-200">
                                        <tr>
                                            <th className="p-4 text-left text-blue-900 font-bold uppercase text-[10px]">Feature</th>
                                            <th className="p-4 text-left text-blue-700 font-bold">SpeediCath Compact Set</th>
                                            <th className="p-4 text-left text-slate-700 font-bold">Actreen Hi-Lite Set / Glys Set</th>
                                            <th className="p-4 text-left text-emerald-700 font-bold">LoFric Hydro-Kit</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        <tr>
                                            <td className="p-4 font-semibold text-slate-500 bg-slate-50">Material</td>
                                            <td className="p-4 text-slate-700">TPU</td>
                                            <td className="p-4 text-slate-700">PVC</td>
                                            <td className="p-4 text-slate-700">POBE</td>
                                        </tr>
                                        <tr>
                                            <td className="p-4 font-semibold text-slate-500 bg-slate-50">Coating</td>
                                            <td className="p-4 text-slate-700">Hydrophilic</td>
                                            <td className="p-4 text-slate-700">Gel-Lubricated</td>
                                            <td className="p-4 text-slate-700">Hydrophilic</td>
                                        </tr>
                                        <tr>
                                            <td className="p-4 font-semibold text-slate-500 bg-slate-50">Characteristics</td>
                                            <td className="p-4 text-slate-700">Telescopic catheter</td>
                                            <td className="p-4 text-slate-700">Non-touch technique</td>
                                            <td className="p-4 text-slate-700">Non-touch technique</td>
                                        </tr>
                                        <tr className="bg-red-50/50">
                                            <td className="p-4 font-semibold text-red-600 bg-red-50">Key Missing Feature</td>
                                            <td className="p-4 text-slate-700 italic">Non-touch sleeve</td>
                                            <td className="p-4 text-slate-700 italic">Modern aesthetic</td>
                                            <td className="p-4 text-slate-700 italic">Ease of activation</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )
                },
                // Slide 5: Faktory úspechu
                {
                    type: 'content',
                    title: 'KEY SUCCESS FACTORS FOR NEW PRODUCT LAUNCH',
                    content: (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
                            {[
                                { id: 1, title: 'Ready-to-Use', desc: 'Patients are accustomed to a convenient and efficient way of using their medical aids. Any new product must minimize preparation time.' },
                                { id: 2, title: 'Preferred Hydrophilic Coating', desc: 'High-quality hydrophilic coating reduces friction during insertion and withdrawal, minimizing discomfort.' },
                                { id: 3, title: 'PVC free material', desc: 'Softer, PVC-free properties are the new market standard.' },
                                { id: 4, title: 'Design', desc: 'A modern, discreet aesthetic is essential for patient acceptance and intuitive use.' }
                            ].map((item) => (
                                <div key={item.id} className="bg-white p-5 rounded-xl border border-slate-200 flex gap-4 items-start shadow-sm">
                                    <div className="bg-blue-100 text-blue-800 font-black text-xl rounded-full w-10 h-10 flex items-center justify-center shrink-0">
                                        {item.id}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-blue-900 mb-1">{item.title}</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed">{item.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )
                },
                // Slide 6: Budovanie značky
                {
                    type: 'content',
                    title: 'BRAND BUILDING & TRUST',
                    content: (
                        <div className="flex flex-col items-center justify-between h-full text-center max-w-2xl mx-auto py-4">
                            <div className="w-full">
                                <p className="text-blue-600 font-semibold mb-8 text-lg">
                                    To succeed, a product should possess the following essential properties:
                                </p>
                                <div className="bg-blue-50 p-8 rounded-full mb-6 mx-auto w-fit">
                                    <Icon name="Target" size={48} className="text-blue-600" />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-4 uppercase tracking-wide">Challenging the Leaders</h3>
                                <p className="text-lg text-slate-700 italic leading-relaxed">
                                    "To challenge leaders like Coloplast, success relies on building <span className="text-blue-700 font-bold">deep patient relationships</span> and a <span className="text-blue-700 font-bold">"bespoke" brand identity</span> that conveys safety, discretion, and technical superiority."
                                </p>
                            </div>
                            <div className="mt-8 flex justify-center items-center">
                                <div className="flex items-center justify-center" style={{ maxWidth: '201px', maxHeight: '46px' }}>
                                    <img 
                                        src="logo.svg" 
                                        alt="EPION Medical Logo" 
                                        className="max-w-full max-h-full object-contain"
                                        style={{ width: 'auto', height: 'auto' }}
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                </div>
                            </div>
                        </div>
                    )
                }
            ];

            const nextSlide = () => { if (currentSlide < slides.length - 1) setCurrentSlide(currentSlide + 1); };
            const prevSlide = () => { if (currentSlide > 0) setCurrentSlide(currentSlide - 1); };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="w-full max-w-5xl bg-white shadow-2xl rounded-2xl overflow-hidden relative flex flex-col aspect-[16/10]">
                        <div className="absolute top-0 left-0 w-full h-1 bg-slate-200">
                            <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }} />
                        </div>
                        <div className="flex-1 p-8 md:p-12 overflow-y-auto">
                            {slides[currentSlide].type === 'title' ? (
                                slides[currentSlide].content
                            ) : (
                                <div className="h-full flex flex-col">
                                    <div className="flex items-center justify-between mb-8 border-b border-slate-100 pb-4">
                                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight uppercase">
                                            {slides[currentSlide].title}
                                        </h2>
                                        <div className="text-sm font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full">
                                            {currentSlide + 1} / {slides.length}
                                        </div>
                                    </div>
                                    <div className="flex-1">
                                        {slides[currentSlide].content}
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                            <button onClick={prevSlide} disabled={currentSlide === 0} className={`flex items-center gap-2 px-6 py-2 rounded-lg font-bold ${currentSlide === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-200'}`}>
                                <Icon name="ChevronLeft" size={20} /> Previous
                            </button>
                            <div className="hidden sm:flex gap-2">
                                {slides.map((_, i) => (
                                    <button key={i} onClick={() => setCurrentSlide(i)} className={`w-3 h-3 rounded-full transition-all ${currentSlide === i ? 'bg-blue-600 w-8' : 'bg-slate-300 hover:bg-slate-400'}`} />
                                ))}
                            </div>
                            <button onClick={nextSlide} disabled={currentSlide === slides.length - 1} className={`flex items-center gap-2 px-6 py-2 rounded-lg font-bold ${currentSlide === slides.length - 1 ? 'text-slate-300 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-200'}`}>
                                Next <Icon name="ChevronRight" size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
